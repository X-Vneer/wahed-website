name: Build & Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/wahed-website:latest
            ghcr.io/${{ env.OWNER }}/wahed-website:${{ github.sha }}
          build-args: |
            WEBSITE_CMS_API_BASE=${{ secrets.WEBSITE_CMS_API_BASE }}
            NEXT_PUBLIC_WEBSITE_CMS_API_BASE=${{ secrets.NEXT_PUBLIC_WEBSITE_CMS_API_BASE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
