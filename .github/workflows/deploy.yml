name: Build & Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wahed-website:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wahed-website:${{ github.sha }}
          build-args: |
            WEBSITE_CMS_API_BASE=${{ secrets.WEBSITE_CMS_API_BASE }}
            NEXT_PUBLIC_WEBSITE_CMS_API_BASE=${{ secrets.NEXT_PUBLIC_WEBSITE_CMS_API_BASE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
